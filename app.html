<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1419">
  <title>BrainPort — Платформа</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="sidebar-overlay hidden" id="sidebarOverlay" aria-hidden="true"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon">🧠</div>
        <div>
          <h1>BrainPort</h1>
          <span id="sidebarRoleLabel">Платформа</span>
        </div>
      </div>
      <nav class="nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="user-mini">
          <div class="user-avatar" id="userAvatar">—</div>
          <div>
            <div class="name" id="userName">—</div>
            <div class="role" id="userRole">—</div>
          </div>
        </div>
        <button type="button" class="btn btn-secondary btn-sm" style="width:100%" id="logoutBtn">Выйти</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Меню">☰</button>
          <h2 id="pageTitle">Главная</h2>
        </div>
        <div class="topbar-actions">
          <div class="search-box hidden" id="globalSearchWrap">
            <span>🔍</span>
            <input type="search" id="globalSearch" placeholder="Поиск материалов...">
          </div>
        </div>
      </header>
      <main class="content" id="appContent">
        <div class="loading-state">Загрузка...</div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
